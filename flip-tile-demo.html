<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flip Tile Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-deep:       #0a0e1a;
      --bg-panel:      #111827;
      --tile-blank:    #1a2235;
      --tile-border:   #2a3a55;
      --tile-revealed: #0d1f3c;
      --tile-face:     #e8f4ff;
      --accent-teal:   #00d4c8;
      --accent-glow:   rgba(0, 212, 200, 0.4);
      --accent-warm:   #f5c842;
      --text-dim:      #4a6080;
    }

    body {
      background: var(--bg-deep);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      font-family: 'Share Tech Mono', monospace;

      /* Subtle grid texture */
      background-image:
        linear-gradient(rgba(0,212,200,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,200,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    h1 {
      font-family: 'Black Han Sans', sans-serif;
      color: var(--accent-teal);
      font-size: 1rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      opacity: 0.6;
    }

    /* ── PUZZLE BOARD ───────────────────────────── */
    .board {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .word-row {
      display: flex;
      gap: 0.4rem;
    }

    /* ── TILE ───────────────────────────────────── */
    .tile-wrap {
      width: 52px;
      height: 64px;
      perspective: 600px;
      cursor: pointer;
    }

    .tile {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4, 0.0, 0.2, 1);
    }

    /* Flipped state */
    .tile.flipped {
      transform: rotateY(180deg);
    }

    /* Both faces share base styles */
    .tile-front,
    .tile-back {
      position: absolute;
      inset: 0;
      border-radius: 6px;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* FRONT — blank tile waiting to be revealed */
    .tile-front {
      background: var(--tile-blank);
      border: 1px solid var(--tile-border);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.05),
        inset 0 -2px 0 rgba(0,0,0,0.3),
        0 4px 12px rgba(0,0,0,0.4);
    }

    /* subtle inset shine on blank */
    .tile-front::after {
      content: '';
      position: absolute;
      top: 4px; left: 4px; right: 4px;
      height: 30%;
      background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, transparent 100%);
      border-radius: 3px;
    }

    /* BACK — revealed letter */
    .tile-back {
      background: linear-gradient(160deg, #0f2744 0%, var(--tile-revealed) 100%);
      border: 1px solid var(--accent-teal);
      transform: rotateY(180deg);
      box-shadow:
        0 0 12px var(--accent-glow),
        0 0 30px rgba(0,212,200,0.15),
        inset 0 1px 0 rgba(0,212,200,0.2);
    }

    .tile-back .letter {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 1.6rem;
      color: var(--tile-face);
      text-shadow: 0 0 20px var(--accent-glow);
      letter-spacing: 0.02em;
    }

    /* Flash on reveal */
    @keyframes reveal-flash {
      0%   { box-shadow: 0 0 40px var(--accent-glow), 0 0 80px rgba(0,212,200,0.3), inset 0 1px 0 rgba(0,212,200,0.4); }
      100% { box-shadow: 0 0 12px var(--accent-glow), 0 0 30px rgba(0,212,200,0.15), inset 0 1px 0 rgba(0,212,200,0.2); }
    }

    .tile.flipped .tile-back {
      animation: reveal-flash 0.6s ease-out 0.3s both;
    }

    /* ── SPACE BETWEEN WORDS ───────────────────── */
    .tile-wrap.space {
      width: 16px;
      pointer-events: none;
    }

    /* ── CONTROLS ───────────────────────────────── */
    .controls {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.6rem 1.4rem;
      border-radius: 4px;
      border: 1px solid var(--accent-teal);
      background: transparent;
      color: var(--accent-teal);
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
    }

    button:hover {
      background: rgba(0,212,200,0.1);
      box-shadow: 0 0 16px var(--accent-glow);
    }

    button.warm {
      border-color: var(--accent-warm);
      color: var(--accent-warm);
    }

    button.warm:hover {
      background: rgba(245,200,66,0.1);
      box-shadow: 0 0 16px rgba(245,200,66,0.3);
    }

    .hint {
      color: var(--text-dim);
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-align: center;
    }
  </style>
</head>
<body>

  <h1>Tile Flip Demo</h1>

  <div class="board" id="board"></div>

  <div class="controls">
    <button onclick="revealAll()">Reveal All</button>
    <button onclick="revealRandom()" class="warm">Reveal Random</button>
    <button onclick="resetAll()">Reset</button>
  </div>

  <p class="hint">Click any tile to flip it</p>

  <script>
    // Demo phrase
    const phrase = "WHEEL OF FORTUNE";
    const words = phrase.split(" ");

    const board = document.getElementById("board");

    // Build the board
    words.forEach(word => {
      const row = document.createElement("div");
      row.className = "word-row";

      [...word].forEach(char => {
        const wrap = document.createElement("div");
        wrap.className = "tile-wrap";

        const tile = document.createElement("div");
        tile.className = "tile";
        tile.dataset.letter = char;

        tile.innerHTML = `
          <div class="tile-front"></div>
          <div class="tile-back"><span class="letter">${char}</span></div>
        `;

        // Click to flip individual tile
        wrap.addEventListener("click", () => {
          tile.classList.toggle("flipped");
        });

        wrap.appendChild(tile);
        row.appendChild(wrap);
      });

      board.appendChild(row);
    });

    // Reveal all — staggered cascade
    function revealAll() {
      const tiles = document.querySelectorAll(".tile");
      tiles.forEach((tile, i) => {
        setTimeout(() => {
          tile.classList.add("flipped");
        }, i * 80);
      });
    }

    // Reveal a random unrevealed tile
    function revealRandom() {
      const hidden = [...document.querySelectorAll(".tile:not(.flipped)")];
      if (!hidden.length) return;
      const pick = hidden[Math.floor(Math.random() * hidden.length)];
      pick.classList.add("flipped");
    }

    // Reset all tiles
    function resetAll() {
      document.querySelectorAll(".tile").forEach(t => t.classList.remove("flipped"));
    }
  </script>
</body>
</html>
