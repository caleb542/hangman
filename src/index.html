<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <link href="./src/images/favicon.png" rel="icon" />
  <title>Hangman </title>

</head>
<body style="visibility:hidden">

  <!-- HEADER -->
  <div class="game-header">
    <h1>Hangman</h1>
    <div class="score-display">
      <div>Score <span class="score-val" id="score">0</span></div>
      <div>Best &nbsp;<span class="score-val" id="best">0</span></div>
    </div>
  </div>

  <!-- HP BAR -->
  <div class="hp-container">
    <div class="hp-header">
      <span class="hp-label">HP</span>
      <span class="hp-count" id="hp-count">5 / 5</span>
    </div>
    <div class="hp-track">
      <div class="hp-fill" id="hp-fill"></div>
    </div>
  </div>

  <!-- CATEGORY -->
  <div class="category">Phrase</div>

  <!-- PUZZLE BOARD -->
  <div class="board" id="board">
    <div class="board-loading">Loading puzzle...</div>
  </div>

  <!-- STATUS -->
  <div class="status-message" id="status"></div>

  <!-- KEYBOARD -->
  <div class="keyboard" id="keyboard"></div>

  <!-- RESET -->
  <button class="btn-reset" id="reset">New Game</button>
  <!-- <script src="./bundle.js"></script> -->
  </body>
</html>
